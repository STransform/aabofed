spring.application.name=armas_springboot-api
spring.jpa.database=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.password=Simon@1234
spring.datasource.username=root
spring.datasource.url=jdbc:mysql://localhost:3306/mof_irms_db_5?serverTimezone=UTC
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.servlet.context-path=/
server.port=9090

rsa.private-key=classpath:certs/private.pem
rsa.public-key=classpath:certs/public.pem

ktg.secure.token.validity=2800
spring.sql.init.mode=never

# File size restrictions
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.enabled=true



# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG
logging.level.com.kindsonthegenius.armas_springboot_api=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Update base URL for production
site.base.url.https=http://irms.mofed.gov.et:9090